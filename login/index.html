<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="barra-superior">
    <p class="titulo-barra">INGRESE SU IDENTIFICACION</p>
  </header>

  <section class="encabezado-marca">
    <article class="contenido-marca">
      <figure class="bandera"></figure>
      <section class="texto-marca">
        <h1 class="titulo-marca">V.S.I.A.F</h1>
        <p class="subtitulo-marca">Sistema de Activos Fijos</p>
      </section>
    </article>
  </section>

  <main class="envoltorio-principal">
    <article class="tarjeta-login">

      <h2 class="titulo-login">Login</h2>

      <table class="tabla-login">
        <tr>
          <td><label class="etiqueta-campo">Nombre del Usuario:</label></td>
          <td><input type="text" id="usuario" class="entrada-campo" /></td>
        </tr>
        <tr>
          <td><label class="etiqueta-campo">Contraseña:</label></td>
          <td><input type="password" id="contrasena" class="entrada-campo" /></td>
        </tr>
        <tr>
          <td colspan="2">
            <section class="fila-pie-login">
              <p class="nota-login"><strong>NOTA:</strong> Es sensible al contexto</p>
              <button type="button" class="boton-aceptar" onclick="window.location.href = '../index.html'">Aceptar</button>
            </section>
          </td>
        </tr>
      </table>

    </article>
  </main>

  <footer class="pie-pagina">
