<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Objgasto — V.S.I.A.F</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="encabezado-marca">
    <article class="contenido-marca">
      <figure class="bandera"></figure>
      <section class="texto-marca">
        <h1 class="titulo-marca">V.S.I.A.F</h1>
        <p class="subtitulo-marca">Sistema de Activos Fijos</p>
      </section>
    </article>
  </section>

<main class="window-frame">
    <div class="window-titlebar">&#9632; Objgasto</div>
 
    <section class="window-body">
      <h2 class="section-title">GESTIÓN DE OBJETO DE GASTO</h2>
 
      <div class="panel">
        <div class="table-wrapper">
          <div class="table-scroll-area">
            <table class="data-table" id="tablaObjgasto">
              <thead>
                <tr>
                  <th scope="col" style="width:10%">ID</th>
                  <th scope="col" style="width:14%">GESTIÓN</th>
                  <th scope="col" style="width:14%">PARTIDA</th>
                  <th scope="col" style="width:62%">DESCRIPCIÓN</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
                <tr><td></td><td></td><td></td><td></td></tr>
              </tbody>
            </table>
          </div>
          <aside class="vscrollbar" aria-hidden="true">
            <button class="vscroll-btn">&#9650;</button>
            <div class="vscroll-track"></div>
            <button class="vscroll-btn">&#9660;</button>
          </aside>
        </div>
        <div class="hscroll-bar" aria-hidden="true">
          <button class="hscroll-btn">&#9664;</button>
          <div class="hscroll-track"></div>
          <button class="hscroll-btn">&#9654;</button>
        </div>
      </div>
 
      <nav class="button-bar" aria-label="Acciones">
        <button class="btn" onclick="accion('nuevo')">Nuevo</button>
        <button class="btn" onclick="accion('editar')">Editar</button>
        <button class="btn" onclick="accion('eliminar')">Eliminar</button>
        <button class="btn" onclick="accion('salir')">Salir</button>
      </nav>
    </section>
 
    <footer class="status-bar" id="statusBar" role="status" aria-live="polite">Listo.</footer>
  </main>
 
  <dialog class="modal-window" id="modalForm" aria-labelledby="modalTitle">
    <header class="modal-titlebar">
      <span id="modalTitle">Nuevo Objeto de Gasto</span>
      <button class="close-btn" onclick="cerrarModal()" aria-label="Cerrar">✕</button>
    </header>
    <section class="modal-body">
      <p class="modal-error" id="modalError" role="alert" hidden></p>
      <label class="modal-field">
        <span>GESTIÓN</span>
        <input type="number" id="fGestion" placeholder="Ej: 2024"/>
      </label>
      <label class="modal-field">
        <span>PARTIDA</span>
        <input type="number" id="fPartida" placeholder="Ej: 41100"/>
      </label>
      <label class="modal-field">
        <span>DESCRIPCIÓN</span>
        <input type="text" id="fDescrip" placeholder="Ej: Edificios" maxlength="100"/>
      </label>
    </section>
    <footer class="modal-footer">
      <button class="btn" onclick="confirmarModal()">Aceptar</button>
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
    </footer>
  </dialog>

    <script>
      const BASE_URL = "https://proyectosis414-g-7bitssinexito-sskc.onrender.com";
const $ = id => document.getElementById(id);
let seleccionada = null;
let modoModal    = null;

function setStatus(msg, tipo = "") {
  const sb = $("statusBar");
  sb.className = "status-bar " + tipo;
  sb.innerHTML = tipo === "loading" ? `<span class="spinner"></span> ${msg}` : msg;
}

function renderizarTabla(lista) {
  const tbody = $("tableBody");
  tbody.innerHTML = "";
  const filas = Math.max(lista.length, 9);
  for (let i = 0; i < filas; i++) {
    const d  = lista[i] || {};
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${d.id??""}</td><td>${d.gestion??""}</td><td>${d.partida??""}</td><td>${d.descrip??""}</td>`;
    if (d.id != null) {
      tr.style.cursor = "pointer";
      tr.onclick = () => {
        document.querySelectorAll("#tableBody tr").forEach(r => r.classList.remove("selected"));
        tr.classList.add("selected");
        seleccionada = d;
        setStatus(`Seleccionado — ID: ${d.id} | Partida: ${d.partida} | ${d.descrip??""}`, "ok");
      };
    }
    tbody.appendChild(tr);
  }
}

async function api(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(BASE_URL + path, opts);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json().catch(() => null);
}

async function cargarLista() {
  setStatus("Cargando...", "loading");
  try {
    const data  = await api("GET", "/objgastos");
    const lista = Array.isArray(data) ? data : (data.content ?? []);
    renderizarTabla(lista);
    setStatus(`${lista.length} registro(s) cargado(s).`, "ok");
  } catch (e) {
    setStatus("Error al cargar: " + e.message, "error");
    renderizarTabla([]);
  }
  seleccionada = null;
}

function abrirModal(modo, d = {}) {
  modoModal = modo;
  $("modalTitle").textContent = modo === "nuevo" ? "Nuevo Objeto de Gasto" : "Editar Objeto de Gasto";
  $("fGestion").value = d.gestion ?? "";
  $("fPartida").value = d.partida ?? "";
  $("fDescrip").value = d.descrip ?? "";
  $("modalError").hidden = true;
  $("modalForm").showModal();
}

function cerrarModal() { $("modalForm").close(); }

async function confirmarModal() {
  const base = {
    gestion : parseInt($("fGestion").value) || null,
    partida : parseInt($("fPartida").value) || null,
    descrip : $("fDescrip").value
  };
  try {
    if (modoModal === "nuevo") await api("POST", "/objgastos", base);
    else                       await api("PUT",  `/objgastos/${seleccionada.id}`, base);
    cerrarModal();
    await cargarLista();
    setStatus("✔ Operación exitosa.", "ok");
  } catch (e) {
    const err = $("modalError");
    err.textContent = "Error: " + e.message;
    err.hidden = false;
  }
}

function accion(tipo) {
  if (tipo === "nuevo") {
    abrirModal("nuevo");

  } else if (tipo === "editar") {
    if (!seleccionada) { setStatus("Seleccione una fila para editar.", "error"); return; }
    abrirModal("editar", seleccionada);

  } else if (tipo === "eliminar") {
    if (!seleccionada) { setStatus("Seleccione una fila para eliminar.", "error"); return; }
    if (!confirm(`¿Eliminar ID ${seleccionada.id} — ${seleccionada.descrip}?`)) return;
    api("DELETE", `/objgastos/${seleccionada.id}`)
      .then(cargarLista)
      .catch(e => setStatus("Error al eliminar: " + e.message, "error"));

  } else if (tipo === "salir") {
    window.location.href = '../index.html';
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") cerrarModal();
  if (e.key === "Enter" && $("modalForm").open) confirmarModal();
});

cargarLista();
    </script>
  </body>
</html>
